<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería XD - Panel de Administración</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..200" />
    <!-- Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="admin.css">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#cf4517",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211511",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="admin-app" class="min-h-screen flex flex-col">
        <!-- Barra Superior -->
        <header class="bg-white dark:bg-background-dark border-b border-primary/10 sticky top-0 z-30">
            <div class="px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <!-- Logo y título -->
                    <div class="flex items-center gap-3">
                        <button onclick="volverALaTienda()" class="flex items-center justify-center w-10 h-10 rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-colors lg:hidden">
                            <span class="material-symbols-outlined">arrow_back</span>
                        </button>
                        <div class="flex items-center gap-2">
                            <div class="bg-primary text-white p-2 rounded-lg">
                                <span class="material-symbols-outlined">coffee</span>
                            </div>
                            <h1 class="text-xl font-bold text-primary">Cafetería XD</h1>
                        </div>
                        <span class="hidden sm:inline-block bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">Administración</span>
                    </div>

                    <!-- Acciones rápidas -->
                    <div class="flex items-center gap-2">
                        <button class="hidden sm:flex items-center gap-2 px-4 py-2 bg-primary/10 text-primary rounded-lg hover:bg-primary/20 transition-colors">
                            <span class="material-symbols-outlined">download</span>
                            <span class="text-sm font-medium">Exportar</span>
                        </button>
                        <button class="p-2 rounded-full hover:bg-primary/10 transition-colors relative">
                            <span class="material-symbols-outlined text-primary">notifications</span>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                        <button class="p-2 rounded-full hover:bg-primary/10 transition-colors" onclick="toggleDarkMode()">
                            <span class="material-symbols-outlined text-primary">dark_mode</span>
                        </button>
                        <button onclick="volverALaTienda()" class="hidden lg:flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">
                            <span class="material-symbols-outlined">store</span>
                            <span class="text-sm font-medium">Volver a la Tienda</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Navegación secundaria (tabs) -->
            <div class="px-4 sm:px-6 lg:px-8 border-t border-primary/10">
                <nav class="flex gap-6 overflow-x-auto no-scrollbar" id="admin-nav">
                    <button onclick="cambiarSeccion('dashboard')" class="tab-active py-4 px-2 border-b-2 border-primary text-primary font-medium text-sm whitespace-nowrap" data-section="dashboard">
                        Dashboard
                    </button>
                    <button onclick="cambiarSeccion('pedidos')" class="py-4 px-2 border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-primary font-medium text-sm whitespace-nowrap transition-colors" data-section="pedidos">
                        Pedidos
                    </button>
                    <button onclick="cambiarSeccion('productos')" class="py-4 px-2 border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-primary font-medium text-sm whitespace-nowrap transition-colors" data-section="productos">
                        Productos
                    </button>
                    <button onclick="cambiarSeccion('inventario')" class="py-4 px-2 border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-primary font-medium text-sm whitespace-nowrap transition-colors" data-section="inventario">
                        Inventario
                    </button>
                    <button onclick="cambiarSeccion('ventas')" class="py-4 px-2 border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-primary font-medium text-sm whitespace-nowrap transition-colors" data-section="ventas">
                        Ventas
                    </button>
                    <button onclick="cambiarSeccion('clientes')" class="py-4 px-2 border-b-2 border-transparent text-slate-500 dark:text-slate-400 hover:text-primary font-medium text-sm whitespace-nowrap transition-colors" data-section="clientes">
                        Clientes
                    </button>
                </nav>
            </div>
        </header>

        <!-- Contenido principal -->
        <main class="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto" id="admin-content">
            <!-- El contenido se carga dinámicamente -->
        </main>

        <!-- Barra inferior para móvil -->
        <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-primary/10 px-4 py-2 z-40">
            <div class="flex justify-around items-center">
                <button onclick="cambiarSeccion('dashboard')" class="flex flex-col items-center p-2 text-primary">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span class="text-[10px] font-medium">Dashboard</span>
                </button>
                <button onclick="cambiarSeccion('pedidos')" class="flex flex-col items-center p-2 text-slate-400">
                    <span class="material-symbols-outlined">receipt_long</span>
                    <span class="text-[10px] font-medium">Pedidos</span>
                </button>
                <button onclick="cambiarSeccion('productos')" class="flex flex-col items-center p-2 text-slate-400">
                    <span class="material-symbols-outlined">coffee</span>
                    <span class="text-[10px] font-medium">Productos</span>
                </button>
                <button onclick="cambiarSeccion('ventas')" class="flex flex-col items-center p-2 text-slate-400">
                    <span class="material-symbols-outlined">payments</span>
                    <span class="text-[10px] font-medium">Ventas</span>
                </button>
                <button onclick="cambiarSeccion('mas')" class="flex flex-col items-center p-2 text-slate-400">
                    <span class="material-symbols-outlined">menu</span>
                    <span class="text-[10px] font-medium">Más</span>
                </button>
            </div>
        </nav>
    </div>

    <script src="admin.js"></script>
</body>
</html>
